{% extends "base.html" %}
{% block title %}Вход для психолога{% endblock %}
{% block content %}
<div class="card card--narrow">
  <h2>Вход для психолога</h2>
  <p class="muted">Введите логин и пароль, которые вам выдал администратор.</p>
  {% if error %}
    <div class="card card--error">
      <strong>Ошибка:</strong> {{ error }}
    </div>
  {% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="stack stack--sm">
      <label>
        <div class="muted field-label">Логин</div>
        <input name="username" autocomplete="username">
      </label>
      <label>
        <div class="muted field-label">Пароль</div>
        <input type="password" name="password" autocomplete="current-password">
      </label>
      <button class="btn" type="submit">Войти</button>
    </div>
  </form>
</div>
{% endblock %}
